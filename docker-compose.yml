version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: minka-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-minka_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-minka_db}
      MYSQL_USER: ${MYSQL_USER:-minka_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-minka_pass_2024}
    ports:
      - "3306:3306"
    volumes:
      - minka_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  minka_mysql_data:
